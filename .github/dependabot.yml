version: 2
updates:
  - package-ecosystem: 'cargo'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      rust-workspace:
        patterns:
          - '*'

  - package-ecosystem: 'bun'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:15'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      frontend-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:30'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:45'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      container-base-images:
        patterns:
          - '*'

  - package-ecosystem: 'docker-compose'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      local-infrastructure-images:
        patterns:
          - '*'
