name: Release image

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      publish:
        description: Push the built image to GHCR
        required: false
        default: false
        type: boolean
      platforms:
        description: Comma-separated Docker build platforms
        required: false
        default: linux/amd64
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.image }}
      platforms: ${{ steps.vars.outputs.platforms }}
      should-push: ${{ steps.vars.outputs.should-push }}
    steps:
      - name: Derive image settings
        id: vars
        shell: bash
        env:
          REQUESTED_PUBLISH: ${{ inputs.publish }}
          REQUESTED_PLATFORMS: ${{ inputs.platforms }}
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "should-push=true" >> "$GITHUB_OUTPUT"
          elif [[ "$REQUESTED_PUBLISH" == "true" ]]; then
            echo "should-push=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-push=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "$REQUESTED_PLATFORMS" ]]; then
            echo "platforms=$REQUESTED_PLATFORMS" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

  build-release-image:
    name: Build release image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: prepare-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare-release.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GHCR
        if: needs.prepare-release.outputs.should-push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ needs.prepare-release.outputs.platforms }}
          push: ${{ needs.prepare-release.outputs.should-push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-image
          cache-to: type=gha,mode=max,scope=release-image
