name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust-format-and-lint:
    name: Rust format & lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --all-targets --all-features -- -D warnings

  rust-unit-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://publaryn:publaryn_test@localhost:5432/publaryn_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: publaryn
          POSTGRES_PASSWORD: publaryn_test
          POSTGRES_DB: publaryn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U publaryn" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Test core crate
        run: cargo test -p publaryn-core

      - name: Test auth library
        run: cargo test -p publaryn-auth --lib

      - name: Test API library
        run: cargo test -p publaryn-api --lib

  rust-integration-tests:
    name: Rust integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgres://publaryn:publaryn_test@localhost:5432/publaryn_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: publaryn
          POSTGRES_PASSWORD: publaryn_test
          POSTGRES_DB: publaryn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U publaryn" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run API integration tests
        run: cargo test -p publaryn-api --test integration_tests

      - name: Run auth integration tests
        run: cargo test -p publaryn-auth --test auth_tests

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock',
            'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend typecheck
        working-directory: frontend
        run: bun run typecheck

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock',
            'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: bun test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock',
            'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Verify generated static entrypoint
        run: test -f frontend/dist/index.html

  docs-build:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-docs-${{ hashFiles('docs/bun.lock',
            'docs/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-docs-

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs site
        working-directory: docs
        run: bun run build

      - name: Verify generated docs entrypoint
        run: test -f docs/.vitepress/dist/index.html

  docker-smoke-build:
    name: Docker smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust-format-and-lint
      - rust-unit-tests
      - rust-integration-tests
      - frontend-typecheck
      - frontend-tests
      - frontend-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: publaryn:ci-smoke
          cache-from: type=gha,scope=ci-docker-smoke
          cache-to: type=gha,mode=max,scope=ci-docker-smoke
