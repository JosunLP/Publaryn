name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  DATABASE_URL: postgres://publaryn:publaryn_test@localhost:5432/publaryn_test

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests (core + auth + adapter crates)
        run: |
          cargo test -p publaryn-core
          cargo test -p publaryn-auth --lib
          cargo test -p publaryn-api --lib

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: publaryn
          POSTGRES_PASSWORD: publaryn_test
          POSTGRES_DB: publaryn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U publaryn"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test -p publaryn-api --test integration_tests
      - name: Run auth integration tests
        run: cargo test -p publaryn-auth --test auth_tests
