services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL — primary datastore
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: publaryn
      POSTGRES_PASSWORD: publaryn_dev
      POSTGRES_DB: publaryn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U publaryn" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Redis — caching, rate limiting, session data
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage for artifacts
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Meilisearch — fast, typo-tolerant search
  # ──────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: dev_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:7700/health" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Publaryn API — the core application
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      SERVER__BIND_ADDRESS: "0.0.0.0:3000"
      SERVER__BASE_URL: "http://localhost:3000"
      DATABASE__URL: "postgres://publaryn:publaryn_dev@postgres/publaryn"
      DATABASE__MAX_CONNECTIONS: "20"
      AUTH__JWT_SECRET: "change_me_in_production_at_least_32_chars"
      AUTH__JWT_TTL_SECONDS: "3600"
      AUTH__SESSION_TTL_SECONDS: "86400"
      AUTH__ISSUER: "http://localhost:3000"
      STORAGE__ENDPOINT: "http://minio:9000"
      STORAGE__BUCKET: "publaryn-artifacts"
      STORAGE__ACCESS_KEY: "minioadmin"
      STORAGE__SECRET_KEY: "minioadmin123"
      STORAGE__REGION: "us-east-1"
      SEARCH__URL: "http://meilisearch:7700"
      SEARCH__API_KEY: "dev_master_key"
      REDIS__URL: "redis://redis:6379"
      RUST_LOG: "info,publaryn=debug"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
